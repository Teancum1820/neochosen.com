<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="description" content="Get involved with C.O.M.E. through sponsorship, donations, volunteering, and community partnerships.">
    <title>Get Involved | C.O.M.E.</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #1a1a1a; background-image: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=2070&auto=format&fit=crop'); background-size: cover; background-position: center; background-attachment: fixed; }
        .font-cinzel { font-family: 'Cinzel', serif; }
        .glassmorphism { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="text-white">
    <main class="container mx-auto px-6 py-12 md:py-24">
        <section class="glassmorphism rounded-lg p-8 md:p-12">
            <header class="text-center mb-12">
                <h1 class="font-cinzel text-4xl md:text-6xl font-bold tracking-wider text-teal-400">Get Involved</h1>
                <p class="text-xl mt-4 text-gray-300">Ways you can contribute</p>
            </header>
            <div class="max-w-4xl mx-auto space-y-12">
                <figure class="bg-black/30 rounded-lg p-8">
                    <h2 class="font-cinzel text-3xl text-teal-300 mb-6 text-center">Partnering with Sub Zero Mission</h2>
                    <div class="md:flex md:items-start md:gap-8 text-left">
                        <img src="https://subzeromission.org/wp-content/uploads/2024/02/Round-logo-SVG-500-px.png" alt="Sub Zero Mission Logo" class="w-40 h-40 object-contain mx-auto md:mx-0 mb-6 md:mb-0 flex-shrink-0">
                        <div>
                            <p class="text-gray-300 mb-4">As part of our special evening with cast members of The Chosen, we are honored to partner with <a href="https://subzeromission.org" target="_blank" rel="noopener noreferrer" class="text-teal-400 hover:text-teal-300 font-bold underline">Sub Zero Mission</a>—a nonprofit dedicated to helping homeless veterans and others in need stay warm during the winter months. We invite all guests to join us in supporting this incredible cause by bringing donations to the door during both events!</p>
                            <p class="text-gray-200 mb-2 font-semibold">Most needed items include:</p>
                            <ul class="list-disc list-inside text-gray-300 space-y-1"><li>Hats, gloves, scarves, socks</li><li>Boots (new or gently used)</li><li>Coats and winter outerwear</li><li>Sleeping bags and blankets</li><li>Tents and tarps</li><li>Hand warmers</li></ul>
                            <p class="text-gray-300 mt-4">Your generosity will directly bless those in need in our community. Together, we can make a difference.</p>
                        </div>
                    </div>
                </figure>
                <figure class="bg-black/30 rounded-lg p-8 text-center">
                    <h2 class="font-cinzel text-3xl text-teal-300 mb-4">Become a Sponsor</h2>
                    <img src="https://img1.wsimg.com/isteam/ip/c76862d1-4b72-4973-80c5-7d12414010ec/Sponsorluk2.jpg/:/cr=t:0%25,l:0%25,w:100%25,h:100%25/rs=w:1240,h:620,cg:true" alt="Handshake representing sponsorship" class="w-full h-64 object-cover rounded-md mx-auto mb-6">
                    <figcaption class="text-gray-300"><a href="/sponsorship-opportunities.html" class="text-teal-400 hover:text-teal-300 transition-colors">Click here to learn more about becoming a sponsor!</a></figcaption>
                </figure>
                <figure class="bg-black/30 rounded-lg p-8 text-center">
                    <h2 class="font-cinzel text-3xl text-teal-300 mb-4">Donate</h2>
                    <img src="https://t4.ftcdn.net/jpg/01/58/74/77/360_F_158747798_HjZVESHPxkgR11svewry83Mg0wzWgrpn.jpg" alt="Plant growing from coins, representing donations" class="w-full h-64 object-cover rounded-md mx-auto mb-6">
                    <figcaption class="text-gray-300 space-y-4"><div><h3 class="font-bold text-lg text-white">Online</h3><p>Visit our <a href="/donate.html" class="font-bold text-blue-400 hover:text-blue-300 transition-colors">donation page</a> to make a donation online.</p></div><div><h3 class="font-bold text-lg text-white">By Mail</h3><p>Please make checks payable to:<br>The Kirtland Heritage Group</p><p class="mt-2">Mail to:<br>38323 Apollo Parkway Unit 7<br>Willoughby, Ohio 44094</p></div></figcaption>
                </figure>
                <figure class="bg-black/30 rounded-lg p-8 text-center">
                    <h2 class="font-cinzel text-3xl text-teal-300 mb-4">Volunteer</h2>
                    <img src="https://images.unsplash.com/photo-1593113646773-028c64a8f1b8?q=80&w=1240&auto=format&fit=crop" alt="Volunteers working together" class="w-full h-64 object-cover rounded-md mx-auto mb-6">
                    <figcaption class="text-gray-300"><p class="mb-6">Interested in volunteering? Please fill out the form below and we'll be in touch!</p><div id="volunteer-form-container"><form action="https://docs.google.com/forms/d/e/1FAIpQLSfxDMT6xD044P30AILhQ_kgiW8jA0YwTbKYwGwOCdgJ2Tkm-g/formResponse" method="POST" target="hidden_iframe_volunteer" id="volunteer-form" class="space-y-4 text-left"><div><label for="volunteerName" class="block text-sm font-medium text-gray-300">Full Name</label><input type="text" name="entry.1659044586" id="volunteerName" required class="mt-1 block w-full bg-gray-800 border border-gray-600 rounded-md shadow-sm py-2 px-3 text-white focus:outline-none focus:ring-teal-500 focus:border-teal-500"></div><div><label for="volunteerEmail" class="block text-sm font-medium text-gray-300">Email Address</label><input type="email" name="entry.1574462920" id="volunteerEmail" required class="mt-1 block w-full bg-gray-800 border border-gray-600 rounded-md shadow-sm py-2 px-3 text-white focus:outline-none focus:ring-teal-500 focus:border-teal-500"></div><div><label for="volunteerPhone" class="block text-sm font-medium text-gray-300">Phone Number</label><input type="tel" name="entry.1123705577" id="volunteerPhone" required class="mt-1 block w-full bg-gray-800 border border-gray-600 rounded-md shadow-sm py-2 px-3 text-white focus:outline-none focus:ring-teal-500 focus:border-teal-500"></div><div class="pt-2 text-center"><button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-4 rounded-md shadow-lg transition-colors duration-300">Submit</button></div></form><iframe name="hidden_iframe_volunteer" id="hidden_iframe_volunteer" style="display:none;"></iframe><div id="volunteer-thank-you" class="hidden text-center mt-6 p-4 bg-teal-900 bg-opacity-80 rounded-lg"><h4 class="text-xl font-bold text-teal-300">Thank You!</h4><p class="text-gray-200 mt-2">We've received your information and will be in touch soon.</p></div></div></figcaption>
                </figure>
            </div>
        </section>
    </main>
    <footer class="text-center py-6 text-gray-500 text-sm"><p>&copy; 2026 Kirtland Heritage Group. All Rights Reserved.</p>    <p class="mt-2"><a href="/about-us.html" class="text-teal-300 hover:text-teal-200">About Us</a></p>
    </footer>
    <script>
        const volunteerFormContainer = document.getElementById('volunteer-form-container');
        if (volunteerFormContainer) {
            const volunteerForm = volunteerFormContainer.querySelector('#volunteer-form');
            const volunteerThankYou = volunteerFormContainer.querySelector('#volunteer-thank-you');
            const volunteerIframe = volunteerFormContainer.querySelector('#hidden_iframe_volunteer');
            let volunteerFormSubmitted = false;
            volunteerForm.addEventListener('submit', () => { volunteerFormSubmitted = true; });
            volunteerIframe.onload = function() { if (volunteerFormSubmitted) { volunteerForm.style.display = 'none'; volunteerThankYou.classList.remove('hidden'); } };
        }

        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').catch((error) => console.error('Service worker registration failed:', error));
          });
        }
    </script>
</body>
</html>
